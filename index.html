<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nazar Steak — Yönetim Paneli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:     #C8822A;
      --amber-lt:  #E8A040;
      --amber-bg:  rgba(200,130,42,0.10);
      --red:       #8B1A1A;
      --red-lt:    #B02020;
      --bg:        #17120C;
      --surface:   #211A11;
      --surface2:  #2C2318;
      --surface3:  #352B1C;
      --border:    rgba(200,130,42,0.14);
      --border-md: rgba(200,130,42,0.30);
      --text:      #F0E6D8;
      --text-2:    #9E8A72;
      --text-3:    #5C4E3A;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ═══════════════════════════════
       SHARED COMPONENTS
    ═══════════════════════════════ */
    input, textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .875rem;
      font-weight: 300;
      outline: none;
      transition: border-color .2s;
    }
    input::placeholder, textarea::placeholder { color: var(--text-3); }
    input:focus, textarea:focus, select:focus { border-color: var(--border-md); }
    select option { background: var(--surface2); }
    textarea { resize: vertical; min-height: 70px; }

    label {
      display: block;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .field { margin-bottom: 16px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary  { background: var(--amber); color: var(--bg); }
    .btn-primary:hover:not(:disabled)  { background: var(--amber-lt); }
    .btn-secondary { background: var(--surface2); color: var(--text-2); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--border-md); color: var(--text); }
    .btn-danger   { background: var(--red); color: #fff; }
    .btn-danger:hover:not(:disabled)  { background: var(--red-lt); }
    .btn-ghost    { background: transparent; color: var(--text-3); padding: 6px 10px; font-size: .8rem; }
    .btn-ghost:hover { color: var(--text-2); }
    .btn-sm       { padding: 6px 12px; font-size: .78rem; }

    .error-msg {
      font-size: .8rem;
      color: #e07070;
      margin-top: 8px;
      min-height: 18px;
    }

    .view { display: none; }
    .view.active { display: flex; }

    /* ═══════════════════════════════
       LOGIN
    ═══════════════════════════════ */
    #view-login {
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 36px 32px 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .login-logo {
      width: 72px; height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(200,130,42,.4));
      margin-bottom: 18px;
    }
    .login-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: .75rem;
      color: var(--text-3);
      letter-spacing: .05em;
      margin-bottom: 28px;
    }
    .login-card .field { width: 100%; }
    .login-card .btn-primary { width: 100%; margin-top: 8px; padding: 12px; font-size: .9rem; }

    /* ═══════════════════════════════
       DASHBOARD LAYOUT
    ═══════════════════════════════ */
    #view-dashboard {
      flex-direction: column;
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-logo {
      width: 32px; height: 32px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(200,130,42,.35));
    }
    .topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .topbar-actions { display: flex; gap: 10px; align-items: center; margin-left: auto; }
    .topbar-user {
      font-size: .75rem;
      color: var(--text-3);
    }

    /* Main area */
    .dashboard-body {
      display: flex;
      flex: 1;
    }

    /* Sidebar */
    #sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 57px);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header span {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    #cat-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }
    .cat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }
    .cat-item:hover { background: var(--surface2); }
    .cat-item.active { background: var(--amber-bg); }
    .cat-item-name {
      font-size: .875rem;
      color: var(--text);
      font-weight: 400;
    }
    .cat-item.active .cat-item-name { color: var(--amber-lt); }
    .cat-item-count {
      font-size: .7rem;
      color: var(--text-3);
      margin-right: 6px;
    }
    .cat-del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      font-size: .9rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color .15s, background .15s;
    }
    .cat-del-btn:hover { color: #e07070; background: rgba(139,26,26,.15); }

    .cat-drag-handle {
      cursor: grab;
      color: var(--text-3);
      padding: 2px 5px 2px 0;
      font-size: .85rem;
      line-height: 1;
      touch-action: none;
      user-select: none;
      flex-shrink: 0;
    }
    .cat-drag-handle:active { cursor: grabbing; }
    .cat-item.dragging {
      opacity: .45;
      background: var(--surface2);
    }
    .cat-item.drag-over {
      border-top: 2px solid var(--amber);
    }

    /* Content */
    #content {
      flex: 1;
      padding: 24px;
      max-width: 760px;
    }
    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }
    .content-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }
    .content-empty {
      color: var(--text-3);
      font-size: .85rem;
      padding: 60px 0;
      text-align: center;
    }

    /* Item cards */
    .item-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .item-card-thumb {
      width: 60px; height: 60px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .item-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .item-card-thumb-ph {
      font-size: 1.4rem;
      opacity: .25;
    }
    .item-card-info { flex: 1; min-width: 0; }
    .item-card-name {
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }
    .item-card-variants {
      font-size: .75rem;
      color: var(--text-3);
    }
    .item-card-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ═══════════════════════════════
       ADD CATEGORY INLINE FORM
    ═══════════════════════════════ */
    #add-cat-form {
      display: none;
      padding: 12px 16px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }
    #add-cat-form.open { display: flex; gap: 8px; }
    #add-cat-form input { flex: 1; }

    /* ═══════════════════════════════
       EDITOR MODAL (overlay)
    ═══════════════════════════════ */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(4,2,1,.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 30px 20px 60px;
      overflow-y: auto;
      opacity: 0; visibility: hidden;
      transition: opacity .25s, visibility .25s;
    }
    #modal-overlay.open { opacity: 1; visibility: visible; }

    .editor-card {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      padding: 28px 28px 32px;
      transform: translateY(14px);
      transition: transform .3s cubic-bezier(.22,1,.36,1);
    }
    #modal-overlay.open .editor-card { transform: translateY(0); }

    .editor-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }

    /* Variants */
    #ed-variants { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .variant-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .variant-row input { flex: 1; }
    .variant-row input[type="number"] { max-width: 110px; }
    .rem-var-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-3);
      width: 32px; height: 36px;
      cursor: pointer;
      font-size: 1rem;
      transition: color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .rem-var-btn:hover { color: #e07070; border-color: rgba(139,26,26,.4); }

    /* Photo upload */
    #ed-photo {
      padding: 8px 14px;
      cursor: pointer;
    }
    #photo-preview {
      margin-top: 10px;
    }
    #photo-preview img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .upload-status {
      font-size: .78rem;
      color: var(--amber-lt);
      margin-top: 6px;
    }

    .editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ═══════════════════════════════
       CONFIRM DIALOG
    ═══════════════════════════════ */
    #confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(4,2,1,.75);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0; visibility: hidden;
      transition: opacity .2s, visibility .2s;
    }
    #confirm-overlay.open { opacity: 1; visibility: visible; }
    .confirm-card {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: 14px;
      padding: 28px 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    .confirm-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      margin-bottom: 10px;
    }
    .confirm-card p {
      font-size: .85rem;
      color: var(--text-2);
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }

    /* ═══════════════════════════════
       MOBILE — sidebar drawer
    ═══════════════════════════════ */

    /* Hamburger butonu — sadece mobilde görünür */
    #menu-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-2);
      padding: 7px 9px;
      cursor: pointer;
      line-height: 1;
      font-size: 1.1rem;
    }

    /* Sidebar backdrop (mobilde) */
    #sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(4,2,1,.65);
      z-index: 299;
    }

    @media (max-width: 680px) {

      /* Topbar */
      #menu-toggle { display: flex; align-items: center; justify-content: center; }
      .topbar { padding: 11px 14px; }
      .topbar-title { font-size: .95rem; }
      .topbar-user { display: none; }

      /* Sidebar — slide-in drawer */
      .dashboard-body { flex-direction: column; position: relative; }

      #sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 78vw;
        max-width: 300px;
        height: 100%;
        z-index: 300;
        transform: translateX(-100%);
        transition: transform .28s cubic-bezier(.22,1,.36,1);
        min-height: unset;
        border-right: 1px solid var(--border-md);
        overflow-y: auto;
      }
      #sidebar.open {
        transform: translateX(0);
        box-shadow: 6px 0 32px rgba(0,0,0,.55);
      }
      #sidebar-backdrop.open { display: block; }

      /* Content — tam genişlik */
      #content {
        padding: 16px;
        max-width: 100%;
        width: 100%;
      }

      /* Content header: başlık + buton alt alta gitmesin, wrap yap */
      .content-header {
        flex-wrap: wrap;
        gap: 10px;
      }
      .content-title { font-size: 1.15rem; }

      /* Item card: aksiyonlar sağda kalır ama sıkışırsa wrap */
      .item-card { gap: 10px; padding: 12px; }
      .item-card-thumb { width: 48px; height: 48px; }
      .item-card-actions { flex-direction: column; gap: 6px; }
      .item-card-actions .btn { font-size: .72rem; padding: 5px 10px; }

      /* Editor modal — tam ekran alttan slide */
      #modal-overlay {
        align-items: flex-end;
        padding: 0;
      }
      .editor-card {
        border-radius: 18px 18px 0 0;
        max-width: 100%;
        padding: 22px 18px 40px;
        max-height: 92dvh;
        overflow-y: auto;
        transform: translateY(100%);
      }
      #modal-overlay.open .editor-card { transform: translateY(0); }

      /* Variant row: fiyat inputu küçülmesin */
      .variant-row input[type="number"] { max-width: 90px; }

      /* Add cat form: dikey layout */
      #add-cat-form.open {
        flex-direction: column;
        gap: 8px;
      }
      #add-cat-form .btn { width: 100%; }

      /* Editor actions: tam genişlik */
      .editor-actions { flex-direction: column-reverse; }
      .editor-actions .btn { width: 100%; padding: 12px; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN VIEW ══ -->
<div id="view-login" class="view active">
  <div class="login-card">
    <img src="logo.png" alt="Nazar" class="login-logo" />
    <h1>Yönetim Paneli</h1>
    <p class="login-subtitle">Nazar Steak &amp; Kavurma</p>
    <div class="field">
      <label>E-posta</label>
      <input id="login-email" type="email" placeholder="ornek@mail.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Şifre</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button id="login-btn" class="btn btn-primary">Giriş Yap</button>
    <div class="error-msg" id="login-err"></div>
  </div>
</div>

<!-- ══ DASHBOARD VIEW ══ -->
<div id="view-dashboard" class="view">

  <!-- Top bar -->
  <div class="topbar">
    <button id="menu-toggle" title="Kategoriler">☰</button>
    <div class="topbar-brand">
      <img src="logo.png" alt="Logo" class="topbar-logo" />
      <span class="topbar-title">Nazar Steak — Admin</span>
    </div>
    <div class="topbar-actions">
      <span class="topbar-user" id="topbar-user"></span>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Çıkış</button>
    </div>
  </div>

  <!-- Sidebar backdrop (mobil drawer için) -->
  <div id="sidebar-backdrop"></div>

  <!-- Body -->
  <div class="dashboard-body">

    <!-- Sidebar: kategoriler -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span>Kategoriler</span>
        <button id="show-add-cat-btn" class="btn btn-ghost btn-sm">+ Ekle</button>
      </div>
      <ul id="cat-list"></ul>
      <!-- Inline add category form -->
      <div id="add-cat-form">
        <input id="new-cat-name" type="text" placeholder="Kategori adı" />
        <button id="add-cat-confirm-btn" class="btn btn-primary btn-sm">Ekle</button>
        <button id="add-cat-cancel-btn" class="btn btn-secondary btn-sm">İptal</button>
      </div>
    </aside>

    <!-- Content: ürünler -->
    <section id="content">
      <div class="content-header">
        <div class="content-title" id="content-title">Kategori seçin</div>
        <button id="add-item-btn" class="btn btn-primary" disabled>+ Ürün Ekle</button>
      </div>
      <div id="item-list">
        <div class="content-empty">Sol panelden bir kategori seçin</div>
      </div>
    </section>

  </div>
</div>

<!-- ══ EDITOR MODAL ══ -->
<div id="modal-overlay">
  <div class="editor-card">
    <div class="editor-title" id="editor-title">Ürün Ekle</div>

    <div class="field">
      <label>Ürün Adı</label>
      <input id="ed-name" type="text" placeholder="örn: Kuzu Pirzola" />
    </div>

    <div class="field">
      <label>Açıklama <span style="text-transform:none;letter-spacing:0;font-weight:300">(opsiyonel)</span></label>
      <textarea id="ed-desc" placeholder="Kısa bir açıklama ekleyin…"></textarea>
    </div>

    <div class="field">
      <label>Kategori</label>
      <select id="ed-cat"></select>
    </div>

    <div class="field">
      <label>Varyantlar (Porsiyon / Kilogram)</label>
      <div id="ed-variants"></div>
      <button id="add-variant-btn" class="btn btn-secondary btn-sm" style="margin-top:6px">+ Varyant Ekle</button>
    </div>

    <div class="field">
      <label>Fotoğraf</label>
      <input id="ed-photo" type="file" accept="image/*" />
      <div id="photo-preview"></div>
      <div class="upload-status" id="upload-status"></div>
    </div>

    <div class="editor-actions">
      <button id="ed-cancel" class="btn btn-secondary">İptal</button>
      <button id="ed-save" class="btn btn-primary">Kaydet</button>
    </div>
  </div>
</div>

<!-- ══ CONFIRM DIALOG ══ -->
<div id="confirm-overlay">
  <div class="confirm-card">
    <h3 id="confirm-title">Emin misiniz?</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-actions">
      <button id="confirm-cancel" class="btn btn-secondary">İptal</button>
      <button id="confirm-ok" class="btn btn-danger">Sil</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  doc, setDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ────────────────────────────────────────
   CONFIG
──────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyDx17iwmc9Wi4Zkx1CkJoQAEbeLA312h7c",
  authDomain: "nazar-et-qr-menu.firebaseapp.com",
  projectId: "nazar-et-qr-menu",
  storageBucket: "nazar-et-qr-menu.firebasestorage.app",
  messagingSenderId: "66531790628",
  appId: "1:66531790628:web:53b3c620224a0666c0edb1"
};
const CLOUDINARY_CLOUD = 'ddiqm2yqa';
const CLOUDINARY_PRESET = 'nazar_menu';

/* ────────────────────────────────────────
   INIT FIREBASE
──────────────────────────────────────── */
const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

/* ────────────────────────────────────────
   STATE
──────────────────────────────────────── */
let categories = [];        // [{id, name, order, items:[...]}]
let activeCatId = null;     // seçili kategori id
let editingItem = null;     // düzenleme: {catId, itemIndex} | null
let pendingPhotoFile = null; // seçili ama henüz upload edilmemiş file
let existingImageUrl = '';   // düzenlemede mevcut resim

/* ────────────────────────────────────────
   VIEW HELPERS
──────────────────────────────────────── */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

/* ────────────────────────────────────────
   AUTH
──────────────────────────────────────── */
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('topbar-user').textContent = user.email;
    showView('dashboard');
    loadCategories();
  } else {
    showView('login');
  }
});

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'E-posta ve şifre gerekli.'; return; }
  try {
    document.getElementById('login-btn').disabled = true;
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    document.getElementById('login-btn').disabled = false;
    errEl.textContent = 'Hatalı e-posta veya şifre.';
  }
});

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

/* ────────────────────────────────────────
   MOBILE SIDEBAR DRAWER
──────────────────────────────────────── */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-backdrop').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');
}
document.getElementById('menu-toggle').addEventListener('click', openSidebar);
document.getElementById('sidebar-backdrop').addEventListener('click', closeSidebar);

/* ────────────────────────────────────────
   LOAD CATEGORIES
──────────────────────────────────────── */
async function loadCategories() {
  const snap = await getDocs(collection(db, 'categories'));
  categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  categories.sort((a, b) => (a.order ?? 99) - (b.order ?? 99));
  renderSidebar();
  if (activeCatId) {
    const still = categories.find(c => c.id === activeCatId);
    if (still) renderItems(still);
    else { activeCatId = null; clearContent(); }
  }
}

/* ────────────────────────────────────────
   SIDEBAR + DRAG-AND-DROP SIRALAMA
──────────────────────────────────────── */
let dragSrcId = null;

function renderSidebar() {
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  categories.forEach(cat => {
    const li = document.createElement('li');
    li.className = 'cat-item' + (cat.id === activeCatId ? ' active' : '');
    li.dataset.id = cat.id;
    li.innerHTML = `
      <span class="cat-drag-handle" title="Sırayı değiştir">⠿</span>
      <span class="cat-item-name">${cat.name}</span>
      <span style="display:flex;align-items:center;gap:2px;margin-left:auto">
        <span class="cat-item-count">${(cat.items || []).length}</span>
        <button class="cat-del-btn" data-id="${cat.id}" title="Kategoriyi sil">✕</button>
      </span>`;

    /* Kategori seç */
    li.addEventListener('click', e => {
      if (e.target.classList.contains('cat-del-btn') ||
          e.target.classList.contains('cat-drag-handle')) return;
      activeCatId = cat.id;
      renderSidebar();
      renderItems(cat);
      document.getElementById('add-item-btn').disabled = false;
      closeSidebar();
    });

    li.querySelector('.cat-del-btn').addEventListener('click', () => confirmDeleteCat(cat));

    /* ── Drag events (mouse) — sadece handle üzerinden başlar ── */
    const handle = li.querySelector('.cat-drag-handle');
    handle.addEventListener('mousedown', () => { li.draggable = true; });
    document.addEventListener('mouseup', () => { li.draggable = false; }, { once: true });

    li.addEventListener('dragstart', e => {
      if (!li.draggable) { e.preventDefault(); return; }
      dragSrcId = cat.id;
      li.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    li.addEventListener('dragend', () => {
      li.classList.remove('dragging');
      list.querySelectorAll('.cat-item').forEach(x => x.classList.remove('drag-over'));
    });
    li.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (cat.id !== dragSrcId) {
        list.querySelectorAll('.cat-item').forEach(x => x.classList.remove('drag-over'));
        li.classList.add('drag-over');
      }
    });
    li.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrcId || dragSrcId === cat.id) return;
      reorderCategories(dragSrcId, cat.id);
    });

    /* ── Touch drag (mobil) ── */
    let touchStartY = 0;
    li.addEventListener('touchstart', e => {
      if (!e.target.classList.contains('cat-drag-handle')) return;
      dragSrcId = cat.id;
      touchStartY = e.touches[0].clientY;
      li.classList.add('dragging');
    }, { passive: true });
    li.addEventListener('touchmove', e => {
      if (!dragSrcId) return;
      const y = e.touches[0].clientY;
      const els = [...list.querySelectorAll('.cat-item:not(.dragging)')];
      list.querySelectorAll('.cat-item').forEach(x => x.classList.remove('drag-over'));
      const target = els.find(el => {
        const r = el.getBoundingClientRect();
        return y >= r.top && y <= r.bottom;
      });
      if (target) target.classList.add('drag-over');
    }, { passive: true });
    li.addEventListener('touchend', () => {
      if (!dragSrcId) return;
      const over = list.querySelector('.cat-item.drag-over');
      if (over && over.dataset.id !== dragSrcId) {
        reorderCategories(dragSrcId, over.dataset.id);
      }
      list.querySelectorAll('.cat-item').forEach(x => {
        x.classList.remove('drag-over');
        x.classList.remove('dragging');
      });
      dragSrcId = null;
    });

    list.appendChild(li);
  });
}

async function reorderCategories(srcId, targetId) {
  const srcIdx    = categories.findIndex(c => c.id === srcId);
  const targetIdx = categories.findIndex(c => c.id === targetId);
  if (srcIdx === -1 || targetIdx === -1) return;

  /* Diziyi yeniden sırala */
  const moved = categories.splice(srcIdx, 1)[0];
  categories.splice(targetIdx, 0, moved);

  /* order alanlarını güncelle ve DOM'u hemen yenile */
  renderSidebar();

  /* Firestore'a paralel yaz */
  try {
    await Promise.all(
      categories.map((cat, i) =>
        updateDoc(doc(db, 'categories', cat.id), { order: i + 1 })
      )
    );
    /* Müşteri cache'ini temizle (menü de güncel sırayla açılsın) */
    localStorage.removeItem('nazarMenu_v1');
  } catch(e) {
    console.error('Sıralama kaydedilemedi:', e);
  }
}

function clearContent() {
  document.getElementById('content-title').textContent = 'Kategori seçin';
  document.getElementById('item-list').innerHTML = '<div class="content-empty">Sol panelden bir kategori seçin</div>';
  document.getElementById('add-item-btn').disabled = true;
}

/* ────────────────────────────────────────
   ADD CATEGORY
──────────────────────────────────────── */
document.getElementById('show-add-cat-btn').addEventListener('click', () => {
  document.getElementById('add-cat-form').classList.toggle('open');
  document.getElementById('new-cat-name').focus();
});
document.getElementById('add-cat-cancel-btn').addEventListener('click', () => {
  document.getElementById('add-cat-form').classList.remove('open');
  document.getElementById('new-cat-name').value = '';
});
document.getElementById('add-cat-confirm-btn').addEventListener('click', addCategory);
document.getElementById('new-cat-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCategory();
});

async function addCategory() {
  const nameInput = document.getElementById('new-cat-name');
  const name = nameInput.value.trim();
  if (!name) return;

  const slug = name
    .toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '');

  const order = categories.length + 1;
  const btn = document.getElementById('add-cat-confirm-btn');
  btn.disabled = true;
  try {
    await setDoc(doc(db, 'categories', slug), { name, order, items: [] });
    nameInput.value = '';
    document.getElementById('add-cat-form').classList.remove('open');
    await loadCategories();
  } catch(e) {
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

/* ────────────────────────────────────────
   DELETE CATEGORY (with confirm)
──────────────────────────────────────── */
function confirmDeleteCat(cat) {
  openConfirm(
    `"${cat.name}" kategorisini sil`,
    `Bu kategori ve içindeki ${(cat.items||[]).length} ürün kalıcı olarak silinecek.`,
    async () => {
      await deleteDoc(doc(db, 'categories', cat.id));
      if (activeCatId === cat.id) { activeCatId = null; clearContent(); }
      await loadCategories();
    }
  );
}

/* ────────────────────────────────────────
   RENDER ITEMS
──────────────────────────────────────── */
function renderItems(cat) {
  document.getElementById('content-title').textContent = cat.name;
  const list = document.getElementById('item-list');
  list.innerHTML = '';

  if (!cat.items || cat.items.length === 0) {
    list.innerHTML = '<div class="content-empty">Bu kategoride henüz ürün yok.</div>';
    return;
  }

  cat.items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'item-card';

    const thumbHtml = item.imageUrl
      ? `<img src="${item.imageUrl}" alt="${item.name}" />`
      : `<span class="item-card-thumb-ph">🥩</span>`;

    const variantsText = (item.variants || [])
      .map(v => `${v.label}: ${v.price ? Number(v.price).toLocaleString('tr-TR') + ' ₺' : '—'}`)
      .join(' · ');

    card.innerHTML = `
      <div class="item-card-thumb">${thumbHtml}</div>
      <div class="item-card-info">
        <div class="item-card-name">${item.name}</div>
        <div class="item-card-variants">${variantsText || '—'}</div>
        ${item.description ? `<div class="item-card-variants" style="margin-top:3px;color:var(--text-3)">${item.description}</div>` : ''}
      </div>
      <div class="item-card-actions">
        <button class="btn btn-secondary btn-sm edit-btn">Düzenle</button>
        <button class="btn btn-danger btn-sm del-btn">Sil</button>
      </div>`;

    card.querySelector('.edit-btn').addEventListener('click', () => openEditor(cat.id, idx));
    card.querySelector('.del-btn').addEventListener('click', () => confirmDeleteItem(cat, idx));
    list.appendChild(card);
  });
}

/* ────────────────────────────────────────
   ADD ITEM BUTTON
──────────────────────────────────────── */
document.getElementById('add-item-btn').addEventListener('click', () => {
  if (!activeCatId) return;
  openEditor(activeCatId, null);
});

/* ────────────────────────────────────────
   EDITOR MODAL
──────────────────────────────────────── */
function openEditor(catId, itemIndex) {
  editingItem = { catId, itemIndex };
  pendingPhotoFile = null;
  existingImageUrl = '';

  document.getElementById('editor-title').textContent = itemIndex === null ? 'Ürün Ekle' : 'Ürün Düzenle';
  document.getElementById('ed-name').value = '';
  document.getElementById('ed-desc').value = '';
  document.getElementById('ed-photo').value = '';
  document.getElementById('photo-preview').innerHTML = '';
  document.getElementById('upload-status').textContent = '';

  // Kategori dropdown
  const catSel = document.getElementById('ed-cat');
  catSel.innerHTML = '';
  categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    if (c.id === catId) opt.selected = true;
    catSel.appendChild(opt);
  });

  // Variants
  const varWrap = document.getElementById('ed-variants');
  varWrap.innerHTML = '';

  if (itemIndex !== null) {
    const cat  = categories.find(c => c.id === catId);
    const item = cat.items[itemIndex];
    document.getElementById('ed-name').value = item.name || '';
    document.getElementById('ed-desc').value = item.description || '';
    existingImageUrl = item.imageUrl || '';
    if (existingImageUrl) {
      document.getElementById('photo-preview').innerHTML =
        `<img src="${existingImageUrl}" alt="mevcut fotoğraf" />`;
    }
    (item.variants || []).forEach(v => addVariantRow(v.label, v.price));
  } else {
    addVariantRow('Porsiyon', '');
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function addVariantRow(label = '', price = '') {
  const wrap = document.getElementById('ed-variants');
  const row = document.createElement('div');
  row.className = 'variant-row';
  row.innerHTML = `
    <input type="text"   placeholder="Etiket (ör: Porsiyon)" value="${label}" />
    <input type="number" placeholder="Fiyat" min="0" step="1" value="${price}" />
    <button class="rem-var-btn" title="Kaldır">−</button>`;
  row.querySelector('.rem-var-btn').addEventListener('click', () => {
    if (document.getElementById('ed-variants').querySelectorAll('.variant-row').length > 1) {
      row.remove();
    }
  });
  wrap.appendChild(row);
}

document.getElementById('add-variant-btn').addEventListener('click', () => addVariantRow());

document.getElementById('ed-cancel').addEventListener('click', closeEditor);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeEditor();
});

function closeEditor() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingItem = null;
  pendingPhotoFile = null;
}

/* ────────────────────────────────────────
   IMAGE COMPRESSION (Canvas → WebP)
──────────────────────────────────────── */
function compressImage(file, maxPx = 1080, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width >= height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else                 { width  = Math.round(width  * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        if (!blob) { reject(new Error('Canvas toBlob başarısız')); return; }
        resolve(blob);
      }, 'image/webp', quality);
    };
    img.onerror = reject;
    img.src = url;
  });
}

/* Photo preview on file select — sıkıştır, önizle */
document.getElementById('ed-photo').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;
  document.getElementById('upload-status').textContent = 'Optimize ediliyor…';
  try {
    const blob = await compressImage(file);
    pendingPhotoFile = blob;
    const previewUrl = URL.createObjectURL(blob);
    const img = document.createElement('img');
    img.src = previewUrl;
    img.alt = 'önizleme';
    img.onload = () => URL.revokeObjectURL(previewUrl);
    document.getElementById('photo-preview').innerHTML = '';
    document.getElementById('photo-preview').appendChild(img);
    document.getElementById('upload-status').textContent = '';
  } catch(e) {
    document.getElementById('upload-status').textContent = 'Sıkıştırma başarısız, orijinal kullanılacak.';
    pendingPhotoFile = file;
  }
});

/* ────────────────────────────────────────
   SAVE ITEM
──────────────────────────────────────── */
document.getElementById('ed-save').addEventListener('click', saveItem);

async function saveItem() {
  const name = document.getElementById('ed-name').value.trim();
  if (!name) {
    document.getElementById('ed-name').focus();
    return;
  }

  const description = document.getElementById('ed-desc').value.trim();
  const targetCatId = document.getElementById('ed-cat').value;

  // Collect variants
  const variants = [];
  document.getElementById('ed-variants').querySelectorAll('.variant-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const label = inputs[0].value.trim();
    const price = parseFloat(inputs[1].value);
    if (label) variants.push({ label, price: isNaN(price) ? 0 : price });
  });
  if (variants.length === 0) {
    alert('En az bir varyant eklemelisiniz.');
    return;
  }

  const saveBtn = document.getElementById('ed-save');
  saveBtn.disabled = true;

  try {
    // Upload photo if selected
    let imageUrl = existingImageUrl;
    if (pendingPhotoFile) {
      document.getElementById('upload-status').textContent = 'Fotoğraf yükleniyor…';
      imageUrl = await uploadToCloudinary(pendingPhotoFile);
      document.getElementById('upload-status').textContent = '';
    }

    const newItem = { name, description, imageUrl, variants };

    const { catId, itemIndex } = editingItem;

    if (catId === targetCatId) {
      // Aynı kategori
      const cat = categories.find(c => c.id === catId);
      const items = [...(cat.items || [])];
      if (itemIndex === null) {
        items.push(newItem);
      } else {
        items[itemIndex] = newItem;
      }
      await updateDoc(doc(db, 'categories', catId), { items });
    } else {
      // Kategori değişti: eski kategoriden çıkar, yeniye ekle
      const oldCat = categories.find(c => c.id === catId);
      const newCat = categories.find(c => c.id === targetCatId);

      if (itemIndex !== null && oldCat) {
        const oldItems = [...(oldCat.items || [])];
        oldItems.splice(itemIndex, 1);
        await updateDoc(doc(db, 'categories', catId), { items: oldItems });
      }

      const newItems = [...(newCat.items || []), newItem];
      await updateDoc(doc(db, 'categories', targetCatId), { items: newItems });
      activeCatId = targetCatId;
    }

    closeEditor();
    await loadCategories();
    const updatedCat = categories.find(c => c.id === activeCatId);
    if (updatedCat) renderItems(updatedCat);
  } catch(e) {
    console.error('Kaydetme hatası:', e);
    alert('Kaydedilemedi: ' + e.message);
  } finally {
    saveBtn.disabled = false;
  }
}

/* ────────────────────────────────────────
   DELETE ITEM
──────────────────────────────────────── */
function confirmDeleteItem(cat, itemIndex) {
  const item = cat.items[itemIndex];
  openConfirm(
    `"${item.name}" ürününü sil`,
    'Bu ürün kalıcı olarak silinecek.',
    async () => {
      const items = [...cat.items];
      items.splice(itemIndex, 1);
      await updateDoc(doc(db, 'categories', cat.id), { items });
      await loadCategories();
      const updated = categories.find(c => c.id === cat.id);
      if (updated) renderItems(updated);
    }
  );
}

/* ────────────────────────────────────────
   CLOUDINARY UPLOAD
──────────────────────────────────────── */
async function uploadToCloudinary(file) {
  const fd = new FormData();
  // Blob ise tarayıcı rastgele isim verebilir; webp uzantısıyla sabitle
  const filename = file instanceof Blob && !(file instanceof File)
    ? 'photo.webp'
    : file.name;
  fd.append('file', file, filename);
  fd.append('upload_preset', CLOUDINARY_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,
    { method: 'POST', body: fd }
  );
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || 'Cloudinary upload başarısız');
  return data.secure_url;
}

/* ────────────────────────────────────────
   CONFIRM DIALOG
──────────────────────────────────────── */
let confirmCallback = null;

function openConfirm(title, msg, onConfirm) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  confirmCallback = onConfirm;
  document.getElementById('confirm-overlay').classList.add('open');
}

document.getElementById('confirm-ok').addEventListener('click', async () => {
  document.getElementById('confirm-overlay').classList.remove('open');
  if (confirmCallback) {
    try { await confirmCallback(); } catch(e) { console.error(e); }
    confirmCallback = null;
  }
});
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmCallback = null;
});
</script>
